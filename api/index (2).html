<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Asbob-Uskunalar Do'koni</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header id="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">⚙️</span>
        <span class="logo-text">Do'kon</span>
      </div>
      <button class="cart-btn" id="cart-btn" onclick="showPage('cart')">
        <span class="cart-icon">🛒</span>
        <span class="cart-badge" id="cart-badge">0</span>
      </button>
    </div>
    <!-- Filter bar -->
    <div class="filter-bar" id="filter-bar">
      <button class="filter-chip active" data-filter="all" onclick="filterBy('all', this)">Hammasi</button>
      <button class="filter-chip" data-filter="sale" onclick="filterBy('sale', this)">🏷 Aksiya</button>
      <div class="filter-divider"></div>
      <div id="brand-chips"></div>
    </div>
  </header>

  <!-- Pages -->
  <main>

    <!-- Catalog page -->
    <div id="page-catalog" class="page active">
      <div id="category-row" class="category-row hidden"></div>
      <div id="products-grid" class="products-grid">
        <div class="skeleton-grid">
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
        </div>
      </div>
    </div>

    <!-- Cart page -->
    <div id="page-cart" class="page">
      <div class="page-title">Savatcha</div>
      <div id="cart-list"></div>
      <div id="cart-empty" class="empty-state hidden">
        <div class="empty-icon">🛒</div>
        <p>Savatcha bo'sh</p>
        <button class="btn-outline" onclick="showPage('catalog')">Katalogga qaytish</button>
      </div>
      <div id="cart-summary" class="cart-summary hidden">
        <div class="summary-row">
          <span>Jami:</span>
          <span id="cart-total-price" class="total-price">0 so'm</span>
        </div>
        <button class="btn-primary" onclick="showPage('checkout')">Buyurtma berish →</button>
      </div>
    </div>

    <!-- Checkout page -->
    <div id="page-checkout" class="page">
      <div class="page-title">Buyurtma</div>
      <div class="form-group">
        <label>Ism Familiya</label>
        <input type="text" id="inp-name" placeholder="Abdullayev Abdulla" autocomplete="name">
      </div>
      <div class="form-group">
        <label>Telefon raqam</label>
        <input type="tel" id="inp-phone" placeholder="+998 90 123 45 67" autocomplete="tel">
        <button class="btn-contact" onclick="requestContact()">📱 Kontaktdan olish</button>
      </div>
      <div class="form-group">
        <label>Manzil (ixtiyoriy)</label>
        <button class="btn-location" id="btn-location" onclick="requestLocation()">
          📍 Lokatsiya yuborish
        </button>
        <span id="location-status"></span>
      </div>
      <div id="order-summary" class="order-summary"></div>
      <button class="btn-primary" onclick="submitOrder()">✅ Tasdiqlash</button>
    </div>

    <!-- Success page -->
    <div id="page-success" class="page">
      <div class="success-state">
        <div class="success-icon">✅</div>
        <h2>Buyurtma qabul qilindi!</h2>
        <p id="success-order-id"></p>
        <p class="success-sub">Tez orada operator siz bilan bog'lanadi.</p>
        <button class="btn-primary" onclick="showPage('catalog'); loadProducts()">
          Davom etish
        </button>
      </div>
    </div>

  </main>

  <script src="app.js"></script>
</body>
</html>
